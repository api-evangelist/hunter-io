naftiko: 1.0.0-alpha2
info:
  label: Hunter Enrichment API
  description: 'Hunter Enrichment API. 3 operations across person, company, and combined enrichment. Lead operation:
    Hunter Enrich Person And Company.'
  tags:
  - Hunter
  - Enrichment
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    HUNTER_API_KEY: HUNTER_API_KEY
capability:
  consumes:
  - type: http
    namespace: enrichment
    baseUri: https://api.hunter.io
    description: Hunter Enrichment business capability.
    resources:
    - name: people-find
      path: /v2/people/find
      operations:
      - name: enrichPerson
        method: GET
        description: Hunter Enrich Person
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: email
          in: query
          type: string
        - name: linkedin_handle
          in: query
          type: string
        - name: clearbit_format
          in: query
          type: boolean
    - name: companies-find
      path: /v2/companies/find
      operations:
      - name: enrichCompany
        method: GET
        description: Hunter Enrich Company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: query
          type: string
          required: true
        - name: clearbit_format
          in: query
          type: boolean
    - name: combined-find
      path: /v2/combined/find
      operations:
      - name: enrichCombined
        method: GET
        description: Hunter Enrich Person And Company
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: email
          in: query
          type: string
          required: true
        - name: clearbit_format
          in: query
          type: boolean
    authentication:
      type: apikey
      key: api_key
      value: '{{env.HUNTER_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: enrichment-rest
    port: 8080
    description: REST adapter for Hunter Enrichment.
    resources:
    - path: /v1/people/find
      name: people-find
      description: REST surface for person enrichment.
      operations:
      - method: GET
        name: enrichPerson
        description: Hunter Enrich Person
        call: enrichment.enrichPerson
        with:
          email: rest.query.email
          linkedin_handle: rest.query.linkedin_handle
          clearbit_format: rest.query.clearbit_format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/companies/find
      name: companies-find
      description: REST surface for company enrichment.
      operations:
      - method: GET
        name: enrichCompany
        description: Hunter Enrich Company
        call: enrichment.enrichCompany
        with:
          domain: rest.query.domain
          clearbit_format: rest.query.clearbit_format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/combined/find
      name: combined-find
      description: REST surface for combined enrichment.
      operations:
      - method: GET
        name: enrichCombined
        description: Hunter Enrich Person And Company
        call: enrichment.enrichCombined
        with:
          email: rest.query.email
          clearbit_format: rest.query.clearbit_format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: enrichment-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hunter Enrichment.
    tools:
    - name: hunter-enrich-person
      description: Hunter Enrich Person
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: enrichment.enrichPerson
      with:
        email: tools.email
        linkedin_handle: tools.linkedin_handle
        clearbit_format: tools.clearbit_format
      outputParameters:
      - type: object
        mapping: $.
    - name: hunter-enrich-company
      description: Hunter Enrich Company
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: enrichment.enrichCompany
      with:
        domain: tools.domain
        clearbit_format: tools.clearbit_format
      outputParameters:
      - type: object
        mapping: $.
    - name: hunter-enrich-combined
      description: Hunter Enrich Person And Company
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: enrichment.enrichCombined
      with:
        email: tools.email
        clearbit_format: tools.clearbit_format
      outputParameters:
      - type: object
        mapping: $.

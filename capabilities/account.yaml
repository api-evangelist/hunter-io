naftiko: 1.0.0-alpha2
info:
  label: Hunter Account API
  description: 'Hunter Account API. 1 operation. Returns plan, reset date, team id, and per-meter usage counters.'
  tags:
  - Hunter
  - Account
  - Usage
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    HUNTER_API_KEY: HUNTER_API_KEY
capability:
  consumes:
  - type: http
    namespace: account
    baseUri: https://api.hunter.io
    description: Hunter Account business capability.
    resources:
    - name: account
      path: /v2/account
      operations:
      - name: getAccount
        method: GET
        description: Hunter Get Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    authentication:
      type: apikey
      key: api_key
      value: '{{env.HUNTER_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: account-rest
    port: 8080
    description: REST adapter for Hunter Account.
    resources:
    - path: /v1/account
      name: account
      description: REST surface for account.
      operations:
      - method: GET
        name: getAccount
        description: Hunter Get Account
        call: account.getAccount
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-mcp
    port: 9090
    transport: http
    description: MCP adapter for Hunter Account.
    tools:
    - name: hunter-get-account
      description: Hunter Get Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account.getAccount
      outputParameters:
      - type: object
        mapping: $.

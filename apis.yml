position: Consuming
description: Hunter.io is an email-intelligence and outbound platform that finds,
  verifies, and enriches professional email addresses at scale. Its public APIs cover
  Domain Search, Email Finder, Email Verifier, Email Count, Discover (company prospecting),
  Person/Company/Combined Enrichment, Leads management, and Account/usage inspection.
  Credit-based metering, plan-tiered monthly allowances, and per-endpoint rate limits
  make it a reference example of a usage-based B2B data API.

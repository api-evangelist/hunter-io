- type: Features
  data:
  - Domain Search returns all emails for a domain with sources, confidence, department,
    and seniority
  - Email Finder predicts the most likely address for a person at a company with 0-100
    confidence
  - Email Verifier runs MX, SMTP, regex, disposable, webmail, accept-all, and block
    checks plus database lookup
  - Email Count is free and unauthenticated for pre-flight sizing of a domain's email
    footprint
  - Discover API for company prospecting via natural language or structured filters
  - Person, company, and combined enrichment with optional Clearbit-shape response
    for drop-in migration
  - Leads API with CRUD, upsert, filtered list, custom attributes, and lead-list scoping
  - Campaigns API for outbound sequences, recipients, opens, clicks, replies, and
    unsubscribes
  - Account API returns plan, reset date, and per-meter usage counters for FinOps
  - Three auth modes: api_key query, X-API-KEY header, or Authorization Bearer
  - Token-bucket-style per-endpoint rate limits with 429 responses (5-15 rps, 50-500
    rpm)
  - Monthly credit allowances per plan with reset_date semantics
  - Chrome and Firefox browser extensions, Google Sheets add-on, and Bulk Tasks UI
  - Native integrations with Salesforce, HubSpot, Zapier, Pipedrive, Zoho CRM, and
    many outbound tools
  - Hunter MCP server and ChatGPT MCP server for agentic email-finder workflows
  - Hunter Claude Plugin for find, verify, and enrich workflows inside Claude
  - GDPR-aligned data handling with 451 responses on restricted personal data
  sources:
  - https://hunter.io/api-documentation
  - https://hunter.io/pricing
  - https://hunter.io/api
  - https://github.com/hunter-io

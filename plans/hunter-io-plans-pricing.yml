description: 'Reconciled plans and pricing for Hunter.io. Credits are the unified currency: 1 credit = 1 domain
  search, 1 email finder result, or 1 verification (with sub-rate verifications counted at 1/2 a credit on most
  tiers). Source: hunter.io/pricing.'
sources:
  - https://hunter.io/pricing
  - https://hunter.io/api-documentation
